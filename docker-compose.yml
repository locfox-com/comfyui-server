networks:
  dokploy-network:
    external: true

volumes:
  shared-data:
  comfyui-models:
  comfyui-output:
  redis-data:

services:
  nginx:
    image: nginx:alpine
    networks:
      - dokploy-network
    depends_on:
      - api
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  api:
    image: comfyui-server-api:latest
    networks:
      - dokploy-network
    volumes:
      - shared-data:/data
    depends_on:
      - redis
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - NO_PROXY=localhost,127.0.0.1,redis,comfyui,api,nginx
      - no_proxy=localhost,127.0.0.1,redis,comfyui,api,nginx
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
    restart: unless-stopped

  redis:
    image: redis:alpine
    networks:
      - dokploy-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  worker:
    image: comfyui-server-worker:latest
    networks:
      - dokploy-network
    volumes:
      - shared-data:/data
    depends_on:
      - redis
      - comfyui
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - NO_PROXY=localhost,127.0.0.1,redis,comfyui,api,nginx
      - no_proxy=localhost,127.0.0.1,redis,comfyui,api,nginx
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
    restart: unless-stopped

  comfyui:
    image: comfyui-server-comfyui:latest
    networks:
      - dokploy-network
    volumes:
      - comfyui-models:/app/ComfyUI/models
      - comfyui-output:/app/ComfyUI/output
      - shared-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
