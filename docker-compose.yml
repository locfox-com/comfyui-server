version: "3.8"

networks:
  external-network:
    driver: bridge
  internal-network:
    driver: bridge
    internal: true

volumes:
  shared-data:
  comfyui-models:
  comfyui-output:
  redis-data:

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - external-network
      - internal-network
    depends_on:
      - api
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  api:
    build: ./api
    networks:
      - internal-network
    volumes:
      - shared-data:/data
    depends_on:
      - redis
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  redis:
    image: redis:alpine
    networks:
      - internal-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  worker:
    build: ./worker
    networks:
      - internal-network
    volumes:
      - shared-data:/data
    depends_on:
      - redis
      - comfyui
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  comfyui:
    build: ./comfyui
    networks:
      - internal-network
    volumes:
      - comfyui-models:/app/ComfyUI/models
      - comfyui-output:/app/ComfyUI/output
      - shared-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped